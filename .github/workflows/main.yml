name: Build_CubicBattle_Stable
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: yes | sdkmanager "ndk;25.1.8937393"

      # ✅ Клонируем raylib
      - name: Clone Raylib
        run: git clone --depth 1 https://github.com/raysan5/raylib.git

      # ✅ Копируем официальный Android Gradle проект
      - name: Prepare Android Project
        run: |
          cp -r raylib/examples/platform_android/android android_project

      # ✅ Подменяем main.c
      - name: Replace main.c
        run: |
          cat <<EOF > android_project/app/src/main/cpp/main.c
          #include "raylib.h"
          #include <math.h>

          int main(void)
          {
              InitWindow(0, 0, "Cubic Battle");

              Camera3D camera = { 0 };
              camera.position = (Vector3){ 10.0f, 10.0f, 10.0f };
              camera.target   = (Vector3){ 0.0f, 0.0f, 0.0f };
              camera.up       = (Vector3){ 0.0f, 1.0f, 0.0f };
              camera.fovy     = 45.0f;
              camera.projection = CAMERA_PERSPECTIVE;

              SetTargetFPS(60);

              while (!WindowShouldClose())
              {
                  float t = GetTime();
                  camera.position.x = 12.0f * cosf(t);
                  camera.position.z = 12.0f * sinf(t);

                  BeginDrawing();
                      ClearBackground(SKYBLUE);
                      BeginMode3D(camera);
                          DrawGrid(20, 1.0f);
                          DrawCube((Vector3){0,1,0}, 2,2,2, RED);
                          DrawCubeWires((Vector3){0,1,0}, 2,2,2, MAROON);
                      EndMode3D();
                      DrawText("Cubic Battle", 20, 20, 30, BLACK);
                      DrawFPS(20, 60);
                  EndDrawing();
              }

              CloseWindow();
              return 0;
          }
          EOF

      - name: Build APK
        working-directory: android_project
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle_APK
          path: android_project/app/build/outputs/apk/debug/app-debug.apk
