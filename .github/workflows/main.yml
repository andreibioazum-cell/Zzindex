name: Build_Cubic_Battle_Native
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Build for Android (arm64-v8a)
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DPLATFORM=Android
          make

      - name: Package APK
        run: |
          # Используем build-tools для упаковки
          # Для краткости: в реальном проекте тут вызывается aapt/zipalign
          echo "Packaging C and Lua into APK..."
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle_Native_APK
          path: build/*.apk
